services:
  - type: web
    name: quick-interview-test
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build && node dist/src/cli/migrate.js
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_PROFILE
        value: render-postgres
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: SESSION_TTL_MINUTES
        value: 480
