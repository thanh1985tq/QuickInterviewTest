name: CI

on:
  push:
  pull_request:

jobs:
  sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: quick_interview
          POSTGRES_PASSWORD: quick_interview
          POSTGRES_DB: quick_interview_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quick_interview -d quick_interview_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_URL: postgresql://quick_interview:quick_interview@localhost:5432/quick_interview_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
